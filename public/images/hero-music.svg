<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" fill="none">
  <!-- Background circle glow -->
  <circle cx="300" cy="300" r="280" fill="url(#glow)" opacity="0.15"/>

  <!-- Outer ring -->
  <circle cx="300" cy="300" r="240" stroke="#2563eb" stroke-width="1" opacity="0.2"/>
  <circle cx="300" cy="300" r="200" stroke="#2563eb" stroke-width="0.5" opacity="0.1"/>

  <!-- Equalizer bars (center piece) -->
  <g transform="translate(180, 200)">
    <rect x="0" y="120" width="18" height="80" rx="9" fill="#2563eb" opacity="0.6">
      <animate attributeName="height" values="80;160;80" dur="1.2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="120;40;120" dur="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="30" y="60" width="18" height="140" rx="9" fill="#2563eb" opacity="0.75">
      <animate attributeName="height" values="140;60;140" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="y" values="60;140;60" dur="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="60" y="30" width="18" height="170" rx="9" fill="#2563eb" opacity="0.9">
      <animate attributeName="height" values="170;90;170" dur="1.4s" repeatCount="indefinite"/>
      <animate attributeName="y" values="30;110;30" dur="1.4s" repeatCount="indefinite"/>
    </rect>
    <rect x="90" y="80" width="18" height="120" rx="9" fill="#d97706" opacity="0.85">
      <animate attributeName="height" values="120;180;120" dur="1.1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="80;20;80" dur="1.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="50" width="18" height="150" rx="9" fill="#2563eb" opacity="0.8">
      <animate attributeName="height" values="150;70;150" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="y" values="50;130;50" dur="1.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="90" width="18" height="110" rx="9" fill="#2563eb" opacity="0.65">
      <animate attributeName="height" values="110;170;110" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="y" values="90;30;90" dur="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="180" y="110" width="18" height="90" rx="9" fill="#d97706" opacity="0.7">
      <animate attributeName="height" values="90;150;90" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="y" values="110;50;110" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="210" y="70" width="18" height="130" rx="9" fill="#2563eb" opacity="0.55">
      <animate attributeName="height" values="130;50;130" dur="0.8s" repeatCount="indefinite"/>
      <animate attributeName="y" values="70;150;70" dur="0.8s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Headphones silhouette -->
  <g transform="translate(300, 160)" opacity="0.12">
    <path d="M-80,0 C-80,-70 -40,-120 0,-120 C40,-120 80,-70 80,0" stroke="#2563eb" stroke-width="8" fill="none" stroke-linecap="round"/>
    <rect x="-92" y="-10" width="24" height="50" rx="12" fill="#2563eb"/>
    <rect x="68" y="-10" width="24" height="50" rx="12" fill="#2563eb"/>
  </g>

  <!-- Musical notes floating -->
  <g opacity="0.3">
    <text x="120" y="180" font-size="28" fill="#2563eb" font-family="serif">&#9835;</text>
    <text x="450" y="150" font-size="22" fill="#d97706" font-family="serif">&#9834;</text>
    <text x="480" y="420" font-size="32" fill="#2563eb" font-family="serif">&#9833;</text>
    <text x="100" y="450" font-size="20" fill="#d97706" font-family="serif">&#9839;</text>
  </g>

  <!-- Sound wave circles -->
  <g transform="translate(300, 300)" opacity="0.08">
    <circle r="120" stroke="#2563eb" stroke-width="1.5" fill="none">
      <animate attributeName="r" values="120;160;120" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="150" stroke="#2563eb" stroke-width="1" fill="none">
      <animate attributeName="r" values="150;190;150" dur="3s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite" begin="1s"/>
    </circle>
  </g>

  <!-- Microphone icon -->
  <g transform="translate(300, 470)" opacity="0.15">
    <rect x="-12" y="-40" width="24" height="45" rx="12" stroke="#2563eb" stroke-width="2.5" fill="none"/>
    <path d="M-25,10 C-25,25 -15,38 0,38 C15,38 25,25 25,10" stroke="#2563eb" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="38" x2="0" y2="55" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-12" y1="55" x2="12" y2="55" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Africa map subtle outline -->
  <g transform="translate(300, 295) scale(0.6)" opacity="0.06">
    <path d="M0,-180 C20,-175 40,-160 45,-140 C50,-120 60,-100 55,-80 C50,-60 60,-40 70,-20 C80,0 75,20 80,40 C85,60 70,80 60,100 C50,120 40,140 20,150 C0,160 -20,150 -30,130 C-40,110 -50,90 -45,70 C-40,50 -50,30 -55,10 C-60,-10 -55,-30 -50,-50 C-45,-70 -40,-90 -35,-110 C-30,-130 -20,-160 0,-180Z" fill="#2563eb"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="130" cy="300" r="4" fill="#d97706" opacity="0.4"/>
  <circle cx="470" cy="280" r="3" fill="#2563eb" opacity="0.3"/>
  <circle cx="200" cy="500" r="5" fill="#2563eb" opacity="0.2"/>
  <circle cx="420" cy="120" r="3.5" fill="#d97706" opacity="0.35"/>
  <circle cx="500" cy="500" r="4" fill="#2563eb" opacity="0.25"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
